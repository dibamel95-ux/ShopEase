<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase</title>
    <link rel="stylesheet" href="ShopEase.css" />
    <link rel="stylesheet" href="footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">ShopEase</div>
      <input
        type="text"
        onkeyup="searchData(this.value)"
        class="btnSearch"
        placeholder="Search A Product"
      />
      <select class="sorting" onchange="priceSort(this.value)">
        <option value="">Sort</option>
        <option value="low">Low To Heigh Price</option>
        <option value="heigh">High To Low Price</option>
      </select>
      <select class="sorting" onchange="categorySort(this.value)">
        <option value="">All</option>
        <option value="beauty">Beauty</option>
        <option value="fragrances">Parfumes</option>
        <option value="groceries">Groceries</option>
        <option value="furniture">Furniture</option>
      </select>

      <div class="cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count">0</span>
      </div>
      <div class="userMenu">
        <a class="login-btn">
          <i class="fa-solid fa-person-arrow-down-to-line"></i>
          <span>Log in</span>
        </a>
        <div class="dropDown">
          <ul class="uList">
            <li class="elementList" id="myCart" onclick="myCart()">My Cart</li>
            <li class="elementList" id="logOut" onclick="logOut()">Log out</li>
          </ul>
        </div>
      </div>
    </header>
    <div id="container"></div>
    <button id="backToTop" title="Go to top">↑</button>
    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-section">
          <h3>ShopEase</h3>
          <p>Your favorite destination for quality products.</p>
        </div>
        <div class="footer-section">
          <h3>Quick Links</h3>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About Us</a></li>
          </ul>
        </div>
        <div class="footer-section">
          <h3>Contact</h3>
          <p>Email: support@shopease.com</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 ShopEase. All rights reserved.</p>
      </div>
    </footer>
    <div id="toast" class="toast">Product added to cart successfully !✅</div>

    <script src="ShopEase.js"></script>
  </body>
</html>
