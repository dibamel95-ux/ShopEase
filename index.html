<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEase</title>
    <link rel="stylesheet" href="ShopEase.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">ShopEase</div>
      <input
        type="text"
        onkeyup="searchData(this.value)"
        class="btnSearch"
        placeholder="Search A Product"
      />
      <select class="sorting" onchange="priceSort(this.value)">
        <option value="">Sort</option>
        <option value="low">Low To Heigh Price</option>
        <option value="heigh">High To Low Price</option>
      </select>
      <select class="sorting" onchange="categorySort(this.value)">
        <option value="">All</option>
        <option value="beauty">Beauty</option>
        <option value="fragrances">Parfumes</option>
        <option value="groceries">Groceries</option>
        <option value="furniture">Furniture</option>
      </select>

      <div class="cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count">0</span>
      </div>
    </header>
    <div id="toast" class="toast">Product added to cart successfully !✅</div>
    <div id="container"></div>
    <footer style="text-align: center; font-weight: bold">
      <p>All Rights Reserved</p>
      <p>2026</p>
    </footer>
    <script src="ShopEase.js"></script>
  </body>
</html>
